{% load socialaccount %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login Social</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        .login-wrapper {
            display: flex;
            height: 100vh;
        }

        .login-left {
            flex: 1;
            background: linear-gradient(135deg, #14b8a6, #ec4899);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .overlay {
            color: white;
            text-align: center;
        }

        .login-right {
            flex: 1;
            background: #f9fafb;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            width: 340px;
            text-align: center;
        }

        .btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;

            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            background: white;
            cursor: pointer;
            text-decoration: none;
            color: black;
            font-weight: 500;
        }

        .btn-google:hover {
            transform: translateY(-2px);
            box-shadow: 0px 5px 15px rgba(0,0,0,0.1);
        }

        img {
            width: 18px;
        }
    </style>
</head>

<body>

<div class="login-wrapper">

    <div class="login-left">
        <div class="overlay">
            <h1>Bienvenido</h1>
            <p>Accede con tu cuenta de Google</p>
        </div>
    </div>

    <div class="login-right">
        <div class="login-box">

            <h2>Continuar con Google</h2>

<a class="btn-google" href="{% provider_login_url 'google' %}">
    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg">
    Continuar con Google
</a>

        </div>
    </div>

</div>

</body>
</html>
